# Old storage root => new storage root (longest match wins)
# Used when transforming historic paths to current NAS layout.
#
# Main rule: old QTS4 download root included an extra "SN" folder segment.
#   /share/Rdownload/downloads/SN/Movies  ->  /share/SN/Movies
#
# Paths under /share/SN Drive/ are left unchanged (no entry here).
#
/share/Rdownload/downloads/SN=/share/SN
/share/Rdownload/complete/SN=/share/SN
/share/CACHEDEV1_DATA/Rdownload/downloads/SN=/share/SN
/share/CACHEDEV1_DATA/Rdownload/complete/SN=/share/SN
/share/CACHEDEV2_DATA/Rdownload/downloads/SN=/share/SN
/share/CACHEDEV2_DATA/Rdownload/complete/SN=/share/SN
/share/CACHEDEV1_DATA/SN=/share/SN
/share/CACHEDEV2_DATA/SN=/share/SN
